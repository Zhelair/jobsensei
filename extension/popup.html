<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JobSensei Capture</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f0ebe3;
        --panel: #fbf8f3;
        --panel-2: #f5f0e8;
        --border: rgba(10, 186, 181, 0.28);
        --text: #1c1410;
        --muted: #7a6458;
        --accent: #0abab5;
        --accent-2: #e96d58;
        --danger: #b42318;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        width: 390px;
        background: radial-gradient(circle at 15% 0%, rgba(10, 186, 181, 0.14), transparent 32%),
          linear-gradient(180deg, #f8f4ee, var(--bg));
        color: var(--text);
        font: 13px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .wrap { padding: 16px; }
      .card {
        background: rgba(251, 248, 243, 0.95);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px;
        box-shadow: 0 12px 34px rgba(74, 58, 44, 0.16);
      }

      h1 {
        margin: 0 0 4px;
        font-size: 18px;
      }

      p {
        margin: 0;
        color: var(--muted);
      }

      .stack { display: grid; gap: 10px; }
      .row { display: grid; gap: 8px; }
      .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }

      input, textarea {
        width: 100%;
        border: 1px solid rgba(122, 100, 88, 0.2);
        border-radius: 11px;
        background: var(--panel-2);
        color: var(--text);
        padding: 10px 12px;
        font: inherit;
      }

      textarea {
        min-height: 132px;
        resize: vertical;
      }

      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      button {
        appearance: none;
        border: none;
        border-radius: 11px;
        cursor: pointer;
        padding: 10px 12px;
        font: inherit;
        font-weight: 600;
      }

      .primary {
        background: var(--accent-2);
        color: white;
      }

      .secondary {
        background: rgba(255, 255, 255, 0.55);
        color: var(--text);
        border: 1px solid rgba(122, 100, 88, 0.16);
      }

      .teal {
        background: var(--accent);
        color: #082825;
      }

      details {
        border-top: 1px solid rgba(122, 100, 88, 0.14);
        padding-top: 8px;
      }

      summary {
        cursor: pointer;
        color: var(--muted);
        font-size: 12px;
        font-weight: 650;
      }

      .status {
        min-height: 18px;
        font-size: 12px;
        color: var(--muted);
      }

      .status.error { color: var(--danger); }
      .status.success { color: #087f5b; }

      .notice {
        border: 1px solid rgba(233, 109, 88, 0.24);
        background: rgba(233, 109, 88, 0.08);
        color: #7a3a2f;
        border-radius: 12px;
        padding: 9px 10px;
        font-size: 12px;
        line-height: 1.35;
      }

      .meta {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        color: var(--muted);
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card stack">
        <div>
          <h1>JobSensei Capture</h1>
          <p>Read the current job page, tweak the fields, then send it into Tracker.</p>
        </div>

        <div class="notice">
          Auto-capture is a helper, not magic. Please review the company, role, and JD before sending.
        </div>

        <div class="row">
          <label class="label" for="company">Company</label>
          <input id="company" type="text" placeholder="Company name" />
        </div>

        <div class="row">
          <label class="label" for="role">Role</label>
          <input id="role" type="text" placeholder="Role title" />
        </div>

        <div class="row">
          <label class="label" for="url">Job URL</label>
          <input id="url" type="url" placeholder="https://..." />
        </div>

        <div class="row">
          <label class="label" for="jdText">Job Description - review before sending</label>
          <textarea id="jdText" placeholder="The extension will try to pull the visible job description here."></textarea>
        </div>

        <div class="meta">
          <span id="sourceMeta">Source: current page</span>
          <span id="lengthMeta">JD: 0 chars</span>
        </div>

        <div class="actions">
          <button id="refreshBtn" class="secondary" type="button">Refresh Capture</button>
          <button id="queueBtn" class="secondary" type="button">Save to Queue</button>
          <button id="sendBtn" class="primary" type="button">Send to JobSensei</button>
        </div>

        <div class="actions">
          <button id="sendQueueBtn" class="teal" type="button">Send Queue</button>
          <button id="clearQueueBtn" class="secondary" type="button">Clear Queue</button>
          <span id="queueMeta" class="status">Queue: 0</span>
        </div>

        <details>
          <summary>Connection</summary>
          <div class="row" style="margin-top: 10px;">
            <label class="label" for="appUrl">JobSensei App URL</label>
            <input id="appUrl" type="url" placeholder="https://jobsensei.app" />
          </div>
        </details>

        <div id="status" class="status"></div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
