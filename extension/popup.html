<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JobSensei Capture</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0d1630;
        --panel: #13213f;
        --panel-2: #18294f;
        --border: rgba(97, 218, 251, 0.16);
        --text: #f6f8ff;
        --muted: #9fb2d9;
        --accent: #19d2d2;
        --accent-2: #2e9bff;
        --danger: #ff8a8a;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        width: 380px;
        background: linear-gradient(180deg, #0d1630, #0b1226);
        color: var(--text);
        font: 13px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .wrap { padding: 16px; }
      .card {
        background: rgba(19, 33, 63, 0.95);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 14px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.22);
      }

      h1 {
        margin: 0 0 4px;
        font-size: 18px;
      }

      p {
        margin: 0;
        color: var(--muted);
      }

      .stack { display: grid; gap: 10px; }
      .row { display: grid; gap: 8px; }
      .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }

      input, textarea {
        width: 100%;
        border: 1px solid rgba(159, 178, 217, 0.16);
        border-radius: 12px;
        background: var(--panel-2);
        color: var(--text);
        padding: 10px 12px;
        font: inherit;
      }

      textarea {
        min-height: 132px;
        resize: vertical;
      }

      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      button {
        appearance: none;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        padding: 10px 12px;
        font: inherit;
        font-weight: 600;
      }

      .primary {
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        color: #07111f;
      }

      .secondary {
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        border: 1px solid rgba(159, 178, 217, 0.14);
      }

      .status {
        min-height: 18px;
        font-size: 12px;
        color: var(--muted);
      }

      .status.error { color: var(--danger); }
      .status.success { color: #86f7cf; }

      .meta {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        color: var(--muted);
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card stack">
        <div>
          <h1>JobSensei Capture</h1>
          <p>Read the current job page, tweak the fields, then send it into Tracker.</p>
        </div>

        <div class="row">
          <label class="label" for="appUrl">JobSensei App URL</label>
          <input id="appUrl" type="url" placeholder="https://jobsensei.app" />
        </div>

        <div class="row">
          <label class="label" for="company">Company</label>
          <input id="company" type="text" placeholder="Company name" />
        </div>

        <div class="row">
          <label class="label" for="role">Role</label>
          <input id="role" type="text" placeholder="Role title" />
        </div>

        <div class="row">
          <label class="label" for="url">Job URL</label>
          <input id="url" type="url" placeholder="https://..." />
        </div>

        <div class="row">
          <label class="label" for="jdText">Job Description</label>
          <textarea id="jdText" placeholder="The extension will try to pull the visible job description here."></textarea>
        </div>

        <div class="meta">
          <span id="sourceMeta">Source: current page</span>
          <span id="lengthMeta">JD: 0 chars</span>
        </div>

        <div class="actions">
          <button id="refreshBtn" class="secondary" type="button">Refresh Capture</button>
          <button id="sendBtn" class="primary" type="button">Send to JobSensei</button>
        </div>

        <div id="status" class="status"></div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
