        padding: 28px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 24px;
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);

      h2 {
        margin: 0 0 12px;
      }

      h1 {
        font-size: 2rem;
      }

      h2 {
        margin-top: 24px;
        font-size: 1.15rem;
        color: var(--accent);
      }

      p,
      li {
        color: var(--text);
      }

      .muted {
        color: var(--muted);
      }

      .pill {
        display: inline-block;
        margin-bottom: 12px;
        padding: 6px 10px;
        border-radius: 999px;
        background: var(--accent-soft);
        border: 1px solid var(--border);
        color: var(--accent);
        font-size: 0.78rem;
        font-weight: 600;
      }

      .callout {
        margin: 20px 0 0;
        padding: 16px 18px;
        border-radius: 18px;
        border: 1px solid rgba(45, 212, 191, 0.26);
        background: rgba(45, 212, 191, 0.08);
      }

      .callout h2 {
        margin-top: 0;
      }

      ul {
        padding-left: 18px;
        margin: 0;
      }

      li + li {
        margin-top: 6px;
      }
