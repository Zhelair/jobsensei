<!doctype html>

    <style>
      :root {
        color-scheme: dark;
        --panel: rgba(14, 26, 48, 0.92);
        --border: rgba(250, 204, 21, 0.22);
        --text: #e2e8f0;
        --muted: #94a3b8;
        --accent: #facc15;
        --accent-soft: rgba(250, 204, 21, 0.12);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, system-ui, sans-serif;
        background:
          radial-gradient(circle at top, rgba(250, 204, 21, 0.12), transparent 32%),
          linear-gradient(180deg, #081325 0%, #0a1730 100%);
        color: var(--text);
        line-height: 1.6;
      }
      main {
        width: min(860px, calc(100vw - 32px));
        margin: 40px auto;
        padding: 28px;
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 24px;
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.35);
      }
      h1, h2 { margin: 0 0 12px; }
      h1 { font-size: 2rem; }
      h2 { margin-top: 24px; font-size: 1.15rem; color: var(--accent); }
      .muted { color: var(--muted); }
      .pill {
        display: inline-block;
        margin-bottom: 12px;
        padding: 6px 10px;
        border-radius: 999px;
        background: var(--accent-soft);
        border: 1px solid var(--border);
        color: var(--accent);
        font-size: 0.78rem;
        font-weight: 600;
      }
      ul { padding-left: 18px; margin: 0; }
      li + li { margin-top: 6px; }
    </style>
  </head>

      const param = new URLSearchParams(window.location.search).get('lang');
      const browserLang = (param || navigator.language || 'en').trim();
      const copy = COPY[browserLang] || COPY[browserLang.split('-')[0]] || COPY.en;

      document.documentElement.lang = browserLang;
      document.getElementById('pill').textContent = copy.pill;
      document.getElementById('title').textContent = copy.title;
      document.getElementById('updated').textContent = copy.updated;
      document.getElementById('intro').textContent = copy.intro;

      const sections = document.getElementById('sections');
      copy.sections.forEach(section => {
        const wrap = document.createElement('section');
        const h2 = document.createElement('h2');
        h2.textContent = section.title;
        wrap.appendChild(h2);
        const list = document.createElement('ul');
        section.items.forEach(item => {
          const li = document.createElement('li');
          li.textContent = item;
          list.appendChild(li);
        });
        wrap.appendChild(list);
        sections.appendChild(wrap);
      });
